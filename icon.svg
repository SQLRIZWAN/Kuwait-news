<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3060"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a8c4e"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="360" cy="310" r="72"/>
    </clipPath>
  </defs>

  <!-- Light background matching the logo -->
  <rect width="512" height="512" fill="#e8eef4"/>
  <radialGradient id="bgGrad" cx="60%" cy="30%" r="70%">
    <stop offset="0%" style="stop-color:#dce8f0;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#c8d8e8;stop-opacity:1"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- ─── KUWAIT TOWERS ─── -->
  <!-- Ground arc / base -->
  <ellipse cx="220" cy="388" rx="130" ry="12" fill="url(#towerGrad)" opacity="0.9"/>

  <!-- Tower 3 – right thin spire -->
  <polygon points="268,210 274,388 262,388" fill="url(#towerGrad)"/>
  <polygon points="268,168 275,210 261,210" fill="url(#towerGrad)"/><!-- tip -->

  <!-- Tower 1 – left, tallest (Liberation Tower style) -->
  <!-- base shaft -->
  <rect x="140" y="300" width="18" height="90" fill="url(#towerGrad)"/>
  <!-- platform ring -->
  <rect x="130" y="294" width="38" height="10" rx="3" fill="url(#towerGrad)"/>
  <!-- ball sphere -->
  <circle cx="149" cy="272" r="24" fill="url(#towerGrad)"/>
  <!-- neck above ball -->
  <rect x="144" y="250" width="10" height="24" fill="url(#towerGrad)"/>
  <!-- spire -->
  <polygon points="149,130 153,252 145,252" fill="url(#towerGrad)"/>
  <!-- spire tip -->
  <circle cx="149" cy="128" r="4" fill="url(#towerGrad)"/>

  <!-- Tower 2 – center, slightly shorter -->
  <!-- base shaft -->
  <rect x="198" y="300" width="22" height="90" rx="2" fill="url(#towerGrad)"/>
  <!-- platform ring -->
  <rect x="188" y="292" width="42" height="12" rx="3" fill="url(#towerGrad)"/>
  <!-- ball sphere -->
  <circle cx="209" cy="268" r="28" fill="url(#towerGrad)"/>
  <!-- spire neck -->
  <rect x="205" y="242" width="8" height="28" fill="url(#towerGrad)"/>
  <!-- spire -->
  <polygon points="209,155 214,244 204,244" fill="url(#towerGrad)"/>
  <!-- spire tip -->
  <circle cx="209" cy="152" r="5" fill="url(#towerGrad)"/>

  <!-- ─── WIFI SIGNAL (top right of towers) ─── -->
  <!-- Dot center -->
  <circle cx="340" cy="188" r="9" fill="url(#greenGrad)"/>
  <!-- Arc 1 (inner) -->
  <path d="M 316,165 A 34,34 0 0 1 364,165" fill="none" stroke="url(#greenGrad)" stroke-width="13" stroke-linecap="round"/>
  <!-- Arc 2 (outer) -->
  <path d="M 298,147 A 56,56 0 0 1 382,147" fill="none" stroke="url(#greenGrad)" stroke-width="13" stroke-linecap="round"/>
  <!-- Arc 3 (outermost) -->
  <path d="M 280,130 A 78,78 0 0 1 400,130" fill="none" stroke="url(#greenGrad)" stroke-width="11" stroke-linecap="round" opacity="0.7"/>

  <!-- ─── GLOBE (bottom right) ─── -->
  <!-- Main circle outline -->
  <circle cx="360" cy="315" r="72" fill="none" stroke="url(#greenGrad)" stroke-width="7"/>
  <!-- Vertical center line -->
  <line x1="360" y1="243" x2="360" y2="387" stroke="url(#greenGrad)" stroke-width="4" opacity="0.7"/>
  <!-- Horizontal center line -->
  <line x1="288" y1="315" x2="432" y2="315" stroke="url(#greenGrad)" stroke-width="4" opacity="0.7"/>
  <!-- Horizontal top line -->
  <line x1="300" y1="279" x2="420" y2="279" stroke="url(#greenGrad)" stroke-width="3" opacity="0.5"/>
  <!-- Horizontal bottom line -->
  <line x1="300" y1="351" x2="420" y2="351" stroke="url(#greenGrad)" stroke-width="3" opacity="0.5"/>
  <!-- Curved vertical left -->
  <path d="M 340,244 Q 315,315 340,386" fill="none" stroke="url(#greenGrad)" stroke-width="3.5" opacity="0.6"/>
  <!-- Curved vertical right -->
  <path d="M 380,244 Q 405,315 380,386" fill="none" stroke="url(#greenGrad)" stroke-width="3.5" opacity="0.6"/>
</svg>
