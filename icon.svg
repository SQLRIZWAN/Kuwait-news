<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Enhanced Main Gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d3b66"/>
      <stop offset="50%" stop-color="#1a5f7a"/>
      <stop offset="100%" stop-color="#2ea854"/>
    </linearGradient>
    
    <!-- Glow Gradient for Spheres -->
    <radialGradient id="sphereGlow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#2ea854" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d3b66" stop-opacity="1"/>
    </radialGradient>
    
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow Filter for WiFi -->
    <filter id="wifiGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Metallic Gradient for Towers -->
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a5f7a"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#0d3b66"/>
    </linearGradient>
  </defs>
  
  <!-- Background Glow Effect -->
  <ellipse cx="250" cy="400" rx="200" ry="60" fill="#2ea854" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Curved Base / Ground Swoosh with Animation -->
  <path d="M 80 420 Q 250 380 420 420 C 440 425 450 435 460 450 L 40 450 Q 50 435 80 420 Z" 
        fill="url(#mainGradient)" filter="url(#dropShadow)">
    <animate attributeName="d" 
             values="M 80 420 Q 250 380 420 420 C 440 425 450 435 460 450 L 40 450 Q 50 435 80 420 Z;
                     M 75 422 Q 250 375 425 422 C 445 427 455 437 465 452 L 35 452 Q 45 437 75 422 Z;
                     M 80 420 Q 250 380 420 420 C 440 425 450 435 460 450 L 40 450 Q 50 435 80 420 Z"
             dur="6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Small Tower (Left) - 100m -->
  <g filter="url(#dropShadow)">
    <path d="M 125 420 L 135 420 L 138 200 L 130 200 L 132 420 Z" 
          fill="url(#towerGradient)"/>
    <!-- Small tower spire -->
    <path d="M 134 200 L 134 120 L 138 200 Z" 
          fill="url(#mainGradient)"/>
    <!-- Blinking light on top -->
    <circle cx="134" cy="115" r="3" fill="#ff6b6b">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Middle Tower - 147m -->
  <g filter="url(#dropShadow)">
    <path d="M 175 420 L 195 420 L 198 280 L 185 280 L 188 420 Z" 
          fill="url(#towerGradient)"/>
    <!-- Middle tower sphere with 3D effect -->
    <circle cx="191.5" cy="260" r="28" 
            fill="url(#sphereGlow)"/>
    <ellipse cx="191.5" cy="260" rx="20" ry="10" fill="#ffffff" opacity="0.2"/>
    <!-- Middle tower spire -->
    <path d="M 191.5 232 L 191.5 180 L 195 232 Z" 
          fill="url(#mainGradient)"/>
    <!-- Blinking light -->
    <circle cx="191.5" cy="175" r="3" fill="#ff6b6b">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main Tower - 187m -->
  <g filter="url(#dropShadow)">
    <path d="M 240 420 L 275 420 L 280 200 L 258 200 L 265 420 Z" 
          fill="url(#towerGradient)"/>
    
    <!-- Main tower lower sphere (larger) with 3D effect -->
    <ellipse cx="269" cy="320" rx="42" ry="38" 
             fill="url(#sphereGlow)"/>
    <ellipse cx="269" cy="320" rx="30" ry="15" fill="#ffffff" opacity="0.15"/>
    
    <!-- Main tower upper sphere with 3D effect -->
    <ellipse cx="269" cy="235" rx="32" ry="28" 
             fill="url(#sphereGlow)"/>
    <ellipse cx="269" cy="235" rx="22" ry="10" fill="#ffffff" opacity="0.2"/>
    
    <!-- Main tower spire -->
    <path d="M 269 207 L 269 100 L 273 207 Z" 
          fill="url(#mainGradient)"/>
    <!-- Blinking light -->
    <circle cx="269" cy="95" r="4" fill="#ff6b6b">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Globe - Wireframe earth grid with rotation animation -->
  <g transform="translate(340, 340)" filter="url(#dropShadow)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite"/>
      
      <!-- Globe circle outline -->
      <circle cx="0" cy="0" r="55" 
              fill="none" stroke="url(#mainGradient)" stroke-width="4"/>
      
      <!-- Vertical longitude lines -->
      <ellipse cx="0" cy="0" rx="15" ry="55" 
               fill="none" stroke="url(#mainGradient)" stroke-width="3" opacity="0.8"/>
      <ellipse cx="0" cy="0" rx="35" ry="55" 
               fill="none" stroke="url(#mainGradient)" stroke-width="3" opacity="0.8"/>
      <ellipse cx="0" cy="0" rx="50" ry="55" 
               fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.6"/>
      
      <!-- Horizontal latitude lines -->
      <line x1="-55" y1="-20" x2="55" y2="-20" 
            stroke="url(#mainGradient)" stroke-width="2" opacity="0.7"/>
      <line x1="-55" y1="0" x2="55" y2="0" 
            stroke="url(#mainGradient)" stroke-width="3" opacity="0.9"/>
      <line x1="-55" y1="20" x2="55" y2="20" 
            stroke="url(#mainGradient)" stroke-width="2" opacity="0.7"/>
    </g>
    
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#2ea854" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="58;62;58" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Wi-Fi Signal with pulse animation -->
  <g transform="translate(340, 180)" filter="url(#wifiGlow)">
    <!-- Wi-Fi dot -->
    <circle cx="0" cy="45" r="6" fill="url(#mainGradient)">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Wi-Fi arcs with staggered animation -->
    <path d="M -25 35 Q 0 15 25 35" 
          fill="none" stroke="url(#mainGradient)" stroke-width="6" stroke-linecap="round" opacity="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M -40 20 Q 0 -10 40 20" 
          fill="none" stroke="url(#mainGradient)" stroke-width="6" stroke-linecap="round" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M -55 5 Q 0 -35 55 5" 
          fill="none" stroke="url(#mainGradient)" stroke-width="6" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Signal waves from main tower to globe -->
  <path d="M 310 320 Q 325 330 340 340" fill="none" stroke="#2ea854" stroke-width="2" stroke-dasharray="5,5" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- Signal waves from WiFi to globe -->
  <path d="M 340 240 Q 340 290 340 285" fill="none" stroke="#2ea854" stroke-width="2" stroke-dasharray="5,5" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
  </path>
</svg>
