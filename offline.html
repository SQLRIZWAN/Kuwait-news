<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A1628">
  <title>KWT News — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A1628;
      color: #F1F5F9;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #F5A623;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }
    .logo span { color: rgba(255,255,255,0.7); font-weight: 400; font-size: 16px; display: block; margin-top: 4px; letter-spacing: 0.15em; }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    button {
      background: #F5A623;
      color: #0A1628;
      border: none;
      border-radius: 12px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .divider {
      width: 48px;
      height: 3px;
      background: rgba(245,166,35,0.35);
      border-radius: 2px;
      margin: 32px auto;
    }
    .tips {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      max-width: 280px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="logo">KWT <span>NEWS</span></div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <button onclick="location.reload()">Try Again</button>
  <div class="divider"></div>
  <p class="tips">Once you're back online, KWT News will reload automatically with the latest Kuwait and world news.</p>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
