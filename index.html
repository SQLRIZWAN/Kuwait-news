    <!-- Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                autoDisplay: false,
                includedLanguages: 'en,ar,ur,hi,fr,bn,ml,ta,tl,te',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
        // Programmatic language switch helper
        function setGoogleTranslateLang(lang) {
            if (lang === 'en') {
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname;
                var iframe = document.querySelector('.goog-te-banner-frame');
                if (iframe) iframe.style.display = 'none';
                var el = document.getElementById(':1.container');
                if (el) el.click();
                return;
            }
            document.cookie = 'googtrans=/en/' + lang + '; path=/';
            document.cookie = 'googtrans=/en/' + lang + '; path=/; domain=' + window.location.hostname;
            var sel = document.querySelector('.goog-te-combo');
            if (sel) {
                sel.value = lang;
                sel.dispatchEvent(new Event('change'));
            }
        }
        // Aggressively suppress every Google Translate UI element after it loads
        function suppressGoogleTranslateUI() {
            var banner = document.querySelector('.goog-te-banner-frame');
            if (banner) { banner.style.cssText = 'display:none!important'; }
            var credit = document.querySelector('.goog-te-gadget');
            if (credit) { credit.style.cssText = 'display:none!important'; }
            document.body.style.top = '0px';
            document.body.removeAttribute('style');
        }
        // Run on load — observe briefly then disconnect once GT is hidden.
        // subtree:true on body fires on EVERY React re-render, so we limit
        // observation to 8s max and disconnect as soon as GT is suppressed.
        window.addEventListener('load', function() {
            suppressGoogleTranslateUI();
            var gtSuppressed = false;
            var obs = new MutationObserver(function() {
                if (gtSuppressed) return;
                var banner = document.querySelector('.goog-te-banner-frame');
                if (banner) {
                    suppressGoogleTranslateUI();
                    gtSuppressed = true;
                    obs.disconnect();
                }
            });
            // Only watch direct children of body — not full subtree
            obs.observe(document.body, { childList: true, subtree: false });
            // Hard stop after 8s regardless
            setTimeout(function() { obs.disconnect(); }, 8000);
        });
    </script>

    <!-- FIX 7: Dark Mode FOUC prevention — must run synchronously before any rendering -->
    <script>
        (function(){
            try {
                var saved = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var isDark = saved ? saved === 'dark' : prefersDark;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.style.colorScheme = 'dark';
                }
            } catch(e) {}
        })();
    </script>

    <!-- CRITICAL: Catch all script errors before any CDN loads -->
    <script>
        window.onerror = function(msg, src, line, col, err) {
            // Suppress cross-origin script errors silently
            if (!msg || msg === 'Script error.' || msg === 'Script error') return true;
            return false;
        };
        window.addEventListener('unhandledrejection', function(e) {
            console.warn('Unhandled promise:', e.reason);
            e.preventDefault();
        });
    </script>

    <style>
        /* =============================================
           KWT NEWS — PREMIUM UI v3.0
           Design Direction: Editorial-luxury news app
           Deep navy + warm gold on crisp white/dark.
           Refined: elevation system, micro-interactions,
           type scale, spacing rhythm, depth layering.
        ============================================= */

        /* ── Design Tokens ── */
        :root {
            --c-primary:   #0A1628;
            --c-accent:    #F5A623;
            --c-accent-dk: #D4890F;
            --c-accent-lt: rgba(245,166,35,0.11);
            --c-surface:   #FFFFFF;
            --c-bg:        #EFF1F7;          /* slightly warmer than before */
            --c-text:      #0D1421;          /* deeper for stronger contrast */
            --c-muted:     #6B7280;
            --c-border:    rgba(0,0,0,0.065);

            /* Three-tier elevation — card / hover / float */
            --shadow-card:  0 2px 12px rgba(0,0,0,0.07);
            --shadow-hover: 0 6px 20px rgba(0,0,0,0.11),
                            0 0 0 1px rgba(245,166,35,0.16);
            --shadow-float: 0 16px 48px rgba(0,0,0,0.16);

            --radius-card: 18px;             /* slightly tighter than 20 for precision */
            --radius-btn:  10px;
            --font-main:   'Inter', system-ui, sans-serif;

            /* Micro-interaction timing */
            --t-fast:   0.14s;
            --t-base:   0.22s;
            --t-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
        }
        .dark {
            --c-surface:   #152035;          /* slightly warmer dark card */
            --c-bg:        #0C1525;          /* richer than 0F172A */
            --c-text:      #EDF2F8;
            --c-muted:     #8896AA;
            --c-border:    rgba(255,255,255,0.075);

            --shadow-card:  0 2px 12px rgba(0,0,0,0.32);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.48),
                            0 0 0 1px rgba(245,166,35,0.16);
            --shadow-float: 0 20px 56px rgba(0,0,0,0.60);
        }

        /* ── Base Reset ── */
        *, *::before, *::after { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-main);
            background: var(--c-bg);
            color: var(--c-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-user-select: text;
            -moz-user-select: text;
            user-select: text;
            top: 0 !important;
        }

        /* Theme color transitions — ONLY on the root elements that actually change color.
           Removed the expensive global * rule which fired on every React re-render.      */
        body, header, .news-card-premium, .kwt-footer,
        .drawer-panel, .sidebar-card, .kwt-ad-banner {
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* ── Custom Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(245,166,35,0.35);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(245,166,35,0.65); }

        /* ── Hide Scrollbar Utility ── */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── RTL Support ── */
        [dir="rtl"] .rtl-flip { transform: scaleX(-1); }

        /* ── Line Clamp Utilities ── */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Google Translate Overrides — hide ALL GT UI elements ── */
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate,
        #goog-gt-tt,
        .goog-te-balloon-frame,
        div#goog-gt-,
        .goog-te-menu-value,
        .goog-te-gadget-icon,
        .goog-te-gadget-simple,
        .VIpgJd-ZVi9od-aZ2wEe,
        .VIpgJd-ZVi9od-aZ2wEe-OiiCO,
        div[id^='\\:'] { display: none !important; }
        #google_translate_element { display: none !important; }
        /* GT forces body top — override */
        body { top: 0 !important; position: static !important; }
        /* Hide the "Translated by Google" bar that appears at screen top */
        .goog-te-spinner-pos { display: none !important; }
        .no-copy { -webkit-user-select: text; user-select: text; }
        .no-copy a, .no-copy button { -webkit-user-select: auto; user-select: auto; }
        .news-content { -webkit-user-select: text; user-select: text; }

        /* ── Dark Mode Global Overrides ── */
        .dark body { background: var(--c-bg); color: var(--c-text); }
        .dark .bg-white { background: var(--c-surface) !important; }
        .dark .text-gray-900 { color: #EDF2F8 !important; }
        .dark .text-gray-800 { color: #DCE6F1 !important; }
        .dark .text-gray-700 { color: #C2CFE0 !important; }
        .dark .border-gray-200 { border-color: var(--c-border) !important; }
        .dark input, .dark textarea {
            background: #1a2d48 !important;
            color: #edf2f8 !important;
            border-color: rgba(255,255,255,0.11) !important;
        }
        .dark .bg-gray-50  { background: #1a2d48 !important; }
        .dark .bg-gray-100 { background: #203552 !important; }
        .dark header { background: #060d1a !important; }

        /* ── Comment Content ── */
        .comment-content { overflow-wrap: break-word; word-break: break-word; }

        /* =============================================
           NEWS CARD — Premium Elevated Style
        ============================================= */
        .news-card-premium {
            border-radius: var(--radius-card) !important;
            border: 1px solid var(--c-border) !important;
            box-shadow: var(--shadow-card) !important;
            background: var(--c-surface) !important;
            transition: transform 0.28s var(--t-spring),
                        box-shadow 0.24s ease,
                        border-color 0.18s ease !important;
            overflow: hidden;
            /* Contain layout/style changes within the card — prevents repaints
               propagating to sibling cards during scroll                        */
            contain: layout style;
        }
        .dark .news-card-premium {
            border-color: rgba(255,255,255,0.065) !important;
        }
        .news-card-premium:hover {
            transform: translateY(-3px) !important;
            box-shadow: var(--shadow-hover) !important;
            will-change: transform;   /* promote to GPU layer only during hover */
        }
        .dark .news-card-premium:hover {
            box-shadow: var(--shadow-float) !important;
        }

        /* Card image — smooth zoom on hover */
        .news-card-premium img.w-full {
            transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94) !important;
        }
        .news-card-premium:hover img.w-full {
            transform: scale(1.035) !important;        /* tighter zoom */
        }

        /* ── Skeleton Cards ── */
        .skeleton-card { border-radius: var(--radius-card) !important; overflow: hidden; }
        .skeleton-img { aspect-ratio: 16/9; width: 100%; }
        @supports not (aspect-ratio: 16/9) {
            .skeleton-img { padding-top: 56.25%; height: 0; position: relative; overflow: hidden; }
        }
        .news-card-img-wrap { aspect-ratio: 16/9; }
        @supports not (aspect-ratio: 16/9) {
            .news-card-img-wrap { padding-top: 56.25%; height: 0; position: relative; overflow: hidden; }
            .news-card-img-wrap > * { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        }

        /* Skeleton shimmer — crisper wave */
        @keyframes shimmer {
            0%   { transform: translate3d(-120%, 0, 0); }
            100% { transform: translate3d(120%, 0, 0); }
        }
        .skeleton {
            position: relative;
            overflow: hidden;
            background: #dde3ef;     /* warmer light base */
            will-change: transform;
            border-radius: 8px;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                105deg,
                transparent 25%,
                rgba(255,255,255,0.65) 50%,
                transparent 75%
            );
            animation: shimmer 1.8s ease-in-out infinite;
            will-change: transform;
        }
        .dark .skeleton { background: #1a2e48; }
        .dark .skeleton::after {
            background: linear-gradient(
                105deg,
                transparent 25%,
                rgba(255,255,255,0.06) 50%,
                transparent 75%
            );
        }

        /* =============================================
           TYPOGRAPHY — Editorial News Hierarchy
        ============================================= */
        .news-title-premium {
            font-size: 17px !important;
            font-weight: 800 !important;
            line-height: 1.36 !important;
            letter-spacing: -0.022em !important;
            color: var(--c-text) !important;
        }
        @media (min-width: 480px) {
            .news-title-premium { font-size: 18px !important; }
        }
        @media (min-width: 768px) {
            .news-title-premium { font-size: 19px !important; }
        }
        @media (min-width: 1024px) {
            .news-title-premium { font-size: 20px !important; }
        }
        .news-desc-premium {
            font-size: 13.5px !important;
            color: var(--c-muted) !important;
            line-height: 1.68 !important;
            font-weight: 400 !important;
            letter-spacing: 0.005em !important;
        }

        /* =============================================
           HEADER — Glassmorphism + refined tab rail
        ============================================= */
        header {
            background: rgba(5,12,24,0.97) !important;
            backdrop-filter: blur(16px) saturate(160%) !important;
            -webkit-backdrop-filter: blur(16px) saturate(160%) !important;
            border-bottom: 1px solid rgba(255,255,255,0.055) !important;
            box-shadow: 0 1px 0 rgba(245,166,35,0.08), 0 4px 24px rgba(0,0,0,0.35) !important;
        }

        /* Category Tab Rail */
        .kwt-tab-rail {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 7px 14px 9px;
            scrollbar-width: none;
        }
        .kwt-tab-rail::-webkit-scrollbar { display: none; }

        .kwt-tab-btn {
            flex-shrink: 0;
            padding: 6px 15px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: 0.015em;
            border: none;
            cursor: pointer;
            transition: background var(--t-base) ease,
                        color var(--t-base) ease,
                        transform var(--t-fast) ease,
                        box-shadow var(--t-base) ease !important;
            white-space: nowrap;
            outline: none;
        }
        .kwt-tab-btn:active { transform: scale(0.94); }

        .kwt-tab-btn.active {
            background: #F5A623 !important;
            color: #0A1628 !important;
            box-shadow: 0 2px 14px rgba(245,166,35,0.5),
                        0 1px 4px rgba(245,166,35,0.3);
        }
        .kwt-tab-btn.inactive {
            background: rgba(255,255,255,0.065) !important;
            color: rgba(255,255,255,0.58) !important;
        }
        .kwt-tab-btn.inactive:hover {
            background: rgba(255,255,255,0.12) !important;
            color: rgba(255,255,255,0.88) !important;
        }

        /* =============================================
           ACTION BUTTONS — Touch-friendly, polished
        ============================================= */
        .card-action-btn {
            min-height: 38px !important;
            min-width: 38px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 5px !important;
            border-radius: 10px !important;
            /* touch-action: manipulation prevents 300ms delay + accidental double-tap open */
            touch-action: manipulation !important;
            -webkit-tap-highlight-color: transparent !important;
            transition: background var(--t-base) ease,
                        color var(--t-base) ease,
                        transform var(--t-fast) ease !important;
        }
        .card-action-btn:hover  { opacity: 0.88; }
        .card-action-btn:active { transform: scale(0.90) !important; }

        /* =============================================
           DRAWER MENU — Deep glass panel
        ============================================= */
        .drawer-panel {
            background: rgba(5,11,23,0.98) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border-left: 1px solid rgba(255,255,255,0.055) !important;
            box-shadow: -8px 0 48px rgba(0,0,0,0.5) !important;
        }
        .drawer-menu-item {
            padding: 11px 16px !important;
            margin-bottom: 2px !important;
            border-radius: 12px !important;
            transition: background var(--t-fast) ease !important;
        }
        .drawer-menu-item:hover {
            background: rgba(245,166,35,0.08) !important;
        }

        /* =============================================
           LANG DROPDOWN
        ============================================= */
        [dir="rtl"] .lang-dropdown {
            right: auto !important;
            left: 0 !important;
            transform-origin: top left !important;
        }
        .lang-dropdown {
            max-width: calc(100vw - 16px) !important;
            border-radius: 16px !important;
            overflow: hidden;
            box-shadow: 0 20px 56px rgba(0,0,0,0.4),
                        0 4px 16px rgba(0,0,0,0.22) !important;
            border: 1px solid rgba(255,255,255,0.09) !important;
        }

        /* =============================================
           MODALS & SHEETS
        ============================================= */
        @keyframes modalUp {
            from { transform: translateY(48px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes modalDown {
            from { transform: translateY(0);    opacity: 1; }
            to   { transform: translateY(48px); opacity: 0; }
        }
        @keyframes drawerSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* =============================================
           TOAST NOTIFICATIONS — spring entry
        ============================================= */
        @keyframes toastSlideIn {
            from { transform: translateX(110%) scale(0.95); opacity: 0; }
            to   { transform: translateX(0)   scale(1);    opacity: 1; }
        }
        @keyframes toastOut {

            to   { opacity: 0; transform: translateX(110%) scale(0.95); }

            from { transform: translateX(100%); opacity: 0; }

            from { opacity: 1; }

            padding: 12px 16px !important;

            align-items: center;
            gap: 10px;
            animation: toastSlideIn 0.38s cubic-bezier(0.34,1.45,0.64,1) forwards;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            padding: 80px 24px;

            width: 88px; height: 88px;

            justify-content: center;

        /* =============================================
           SIDEBAR — polished numbered list
        ============================================= */
        .sidebar-item-num {
            font-size: 18px !important;
            font-weight: 900 !important;
            font-variant-numeric: tabular-nums !important;
            color: rgba(245,166,35,0.22) !important;
            min-width: 30px !important;
            line-height: 1 !important;
            letter-spacing: -0.03em !important;
        }
        .sidebar-card {
            border-radius: 16px !important;
            overflow: hidden;
            border: 1px solid var(--c-border) !important;
            box-shadow: var(--shadow-card) !important;

            box-shadow: var(--shadow-hover) !important;

        .kwt-category-badge {
            display: inline-flex;
            align-items: center;
            font-size: 10px !important;
            font-weight: 700 !important;
            letter-spacing: 0.07em !important;
            text-transform: uppercase !important;
            padding: 2.5px 8px !important;
            border-radius: 999px !important;
            background: rgba(245,166,35,0.09) !important;
            color: #C47D0A !important;
            border: 1px solid rgba(245,166,35,0.20) !important;
        }
        .dark .kwt-category-badge {
            background: rgba(245,166,35,0.11) !important;
            color: #F5A623 !important;
            border-color: rgba(245,166,35,0.18) !important;
        }

        /* =============================================
           PWA INSTALL PROMPT — premium app install card

        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-bottom: max(16px, env(safe-area-inset-bottom));

            pointer-events: none;
        }
        .install-prompt.show {
            display: flex;
            animation: slideUpFull 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .install-prompt-inner {
            pointer-events: all;
            width: calc(100% - 32px);
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(135deg, #0d1e38 0%, #112240 50%, #162f52 100%);
            border: 1px solid rgba(245,166,35,0.4);
            border-radius: 22px;
            padding: 16px 18px;
            box-shadow:

                0 0 0 1px rgba(245,166,35,0.07),
                inset 0 1px 0 rgba(255,255,255,0.07);
            backdrop-filter: blur(28px);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
        }
        .install-prompt-glow {
            position: absolute;
            top: -1px; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #F5A623, transparent);
            border-radius: 2px;

        @keyframes slideUpFull {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }

            backdrop-filter: blur(6px) !important;
            -webkit-backdrop-filter: blur(6px) !important;

            border: 1px solid rgba(255,255,255,0.09) !important;
            padding: 3.5px 9px !important;
            font-size: 11px !important;
            font-weight: 700 !important;
        }

        /* =============================================
           FOOTER — layered gradient with accent border
        ============================================= */
        .kwt-footer {
            background: linear-gradient(180deg, #0A1628 0%, #07101f 60%, #050d18 100%) !important;
            border-top: 1px solid rgba(245,166,35,0.12) !important;
            /* Subtle top glow line */
            box-shadow: inset 0 1px 0 rgba(245,166,35,0.07) !important;
        }
        .kwt-social-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.055) !important;
            border: 1px solid rgba(255,255,255,0.09) !important;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.60);
            text-decoration: none;
            transition: background var(--t-base) ease,
                        border-color var(--t-base) ease,
                        transform var(--t-base) var(--t-spring),
                        color var(--t-base) ease !important;
        }
        .kwt-social-btn:hover {
            background: rgba(245,166,35,0.16) !important;
            border-color: rgba(245,166,35,0.38) !important;
            color: #F5A623 !important;
            transform: translateY(-3px) scale(1.06) !important;
        }

        /* =============================================
           LOGO — playful spring bounce
        ============================================= */
        .kwt-logo-icon {
            transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1) !important;
        }
        .kwt-logo-icon:hover { transform: rotate(-6deg) scale(1.1) !important; }

        /* =============================================
           AD BANNER — understated pro style
        ============================================= */
        .kwt-ad-banner {
            border-radius: 14px !important;
            border: 1px solid var(--c-border) !important;
            overflow: hidden;
            box-shadow: var(--shadow-card) !important;
        }

        /* =============================================
           NEWS DETAIL MODAL — smooth spring entry
        ============================================= */
        .kwt-detail-modal {
            animation: modalUp 0.32s cubic-bezier(0.34,1.18,0.64,1);
        }

        /* =============================================
           SEARCH MODAL — deep shadow glass box
        ============================================= */
        .kwt-search-box {
            border-radius: 20px !important;
            box-shadow: 0 28px 80px rgba(0,0,0,0.7),
                        0 8px 28px rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255,255,255,0.09) !important;
        }

        /* =============================================
           RESPONSIVE REFINEMENTS
        ============================================= */
        @media (max-width: 480px) {
            .news-title-premium { font-size: 16px !important; }
            .news-desc-premium  { font-size: 13px !important; }
        }

        /* =============================================
           FOCUS STATES — Accessibility ring
        ============================================= */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid #F5A623 !important;
            outline-offset: 2px !important;
            box-shadow: 0 0 0 4px rgba(245,166,35,0.18) !important;
        }

        /* Input & textarea: clean border-glow instead of a hard outline ring
           — prevents the jarring yellow stripe on rounded containers          */
        input:focus-visible,
        textarea:focus-visible {
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(245,166,35,0.45) !important;
        }

        /* Comment box inner textarea — the parent pill already carries focus,
           so suppress the ring on the textarea itself                          */
        .kwt-comment-input textarea:focus-visible,
        .kwt-comment-input textarea:focus {
            outline: none !important;
            box-shadow: none !important;
        }
        /* Active state on the pill wrapper instead */
        .kwt-comment-input:focus-within {
            border-color: rgba(245,166,35,0.4) !important;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.12) !important;
        }

        /* Search input — suppress outline, highlight via container border */
        .kwt-search-input:focus-visible,
        .kwt-search-input:focus {
            outline: none !important;
            box-shadow: none !important;
        }
        .kwt-search-wrap:focus-within {
            border-color: rgba(245,166,35,0.5) !important;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.1) !important;
        }

        /* =============================================
           SELECTION COLOR
        ============================================= */
        ::selection {
            background: rgba(245,166,35,0.26);
            color: inherit;
        }

    <!-- Service Worker Registration — sw.js handles both caching AND Firebase push -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js')
                    .then(function (reg) {
                        console.log('[KWT] SW registered, scope:', reg.scope);
                        // Tell Firebase Messaging to use this SW (prevents double-SW conflict)
                        try {
                            if (typeof firebase !== 'undefined' && firebase.messaging && firebase.messaging.isSupported()) {
                                firebase.messaging().useServiceWorker(reg);
                            }
                        } catch(e) {}
                    })
                    .catch(function (err) { console.warn('[KWT] SW registration failed:', err); });
            });
        }
    </script>

    <!-- PWA Install Prompt Only -->
    <script>
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('install-prompt');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            window.kwtInstallReady = true;
            setTimeout(() => {
                if (installPrompt) installPrompt.classList.add('show');
            }, 500);
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                    if (installPrompt) installPrompt.classList.remove('show');
                });
            }
        }
        
        function dismissInstall() {
            if (installPrompt) installPrompt.classList.remove('show');
        }
    </script>
