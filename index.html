                        // Try to get FCM token
                        try {
                            const token = messaging ? await messaging.getToken({
                                vapidKey: 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDkBWAVe7axcl0bYFdCvD29NBwkk5K2cGjlj'
                            }) : null;
                            if (token) {
                                await db.collection('fcm_tokens').doc(token).set({
                                    token,
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                    platform: 'web'
                                });
                            }
                        } catch (fcmErr) {
                            console.log('FCM token error (non-critical):', fcmErr);
                        }
                        // Show welcome notification
                        new Notification('KWT News 🗞️', {
                            body: 'Notifications enabled! You will receive breaking news alerts.',
                            icon: '/icon-192.png',
                            badge: '/icon-192.png',
                            tag: 'kwt-welcome'
                        });
                        addNotification({ message: '🔔 Notifications enabled!', type: 'success' });
                    } else {
                        try { localStorage.setItem('kwtNotifEnabled', 'false'); } catch(e) {}
                    }
                } catch (err) {
                    console.error('Notification permission error:', err);
                }
            };

            // Listen for ALL new news from Firestore → fire native notification for every new article
            useEffect(() => {
                if (notifPermission !== 'granted') return;
                // Register FCM token so backend can send push to all users
                if (messaging) {
                    messaging.getToken({ vapidKey: 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDkBWAVe7axcl0bYFdCvD29NBwkk5K2cGjlj' })
                        .then(token => {
                            if (token) {
                                db.collection('fcm_tokens').doc(token).set({
                                    token,
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                    platform: 'web'
                                }).catch(() => {});
                            }
                        }).catch(() => {});
                }
                // Real-time listener — ALL news, newest first, limit 1 → fires on every new article
                const unsubscribe = db.collection('news')
                    .orderBy('timestamp', 'desc')
                    .limit(1)
                    .onSnapshot((snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === 'added') {
                                const article = change.doc.data();
                                if (article.hidden || (article.status && article.status.toLowerCase() === 'inactive')) return;
                                // Only notify if article is fresh (< 3 min old)
                                const age = Date.now() - (article.timestamp?.toMillis?.() || 0);
                                if (age < 180000) {
                                    const isBreaking = article.isBreaking;
                                    const title = isBreaking ? '🚨 Breaking — KWT News' : '🗞️ KWT News';
                                    new Notification(title, {
                                        body: article.title || 'New news update',
                                        icon: article.imageUrl || '/icon-192.png',
                                        badge: '/icon-192.png',
                                        tag: 'kwt-news-' + change.doc.id,
                                        requireInteraction: isBreaking,
                                        vibrate: isBreaking ? [200, 100, 200] : [100]
                                    });
                                }
                            }
                        });
                    }, () => {});
                return () => unsubscribe();
            }, [notifPermission]);

            // Filter news based on search
            const filteredNews = useMemo(() => {
                if (!searchQuery) return news;
                return news.filter(item => 
                    item.title?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.summary?.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }, [news, searchQuery]);
            
            // Insert ads every 5th item
            const newsWithAds = useMemo(() => {
                const result = [];
                filteredNews.forEach((item, index) => {
                    if (index > 0 && index % 5 === 0) {
                        result.push({ type: 'ad', id: `ad-${index}` });
                    }
                    result.push({ type: 'news', data: item });
                });
                return result;
            }, [filteredNews]);
            
            const tabs = [
                { id: 'all', label: t('home') },
                { id: 'kuwait', label: t('kuwait') },
                { id: 'world', label: t('world') },
                { id: 'kuwait-jobs', label: '💼 Kuwait Jobs' },
                { id: 'kuwait-offers', label: '🛍️ Kuwait Offers' },
                { id: 'funny-news-meme', label: '😂 Funny & Memes' },
            ];

            return (
                <div className="min-h-screen bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text font-sans transition-colors duration-300">
                    <Header 
                        activeTab={activeTab} 
                        setActiveTab={navigateTab}
                        searchQuery={searchQuery}
                        setSearchQuery={setSearchQuery}
                        onReadMore={setSelectedNews}
                    />
                    
                    {/* 🔔 Notification Permission Banner */}
                    {showNotifBanner && (
                        <div className="bg-gradient-to-r from-primary to-blue-900 text-white px-4 py-3 flex items-center gap-3 shadow-lg">
                            <span className="text-2xl flex-shrink-0">🔔</span>
                            <div className="flex-1 min-w-0">
                                <p className="text-sm font-semibold">Stay updated with Breaking News!</p>
                                <p className="text-xs text-gray-300">Get instant alerts for latest Kuwait & World news.</p>
                            </div>
                            <button
                                onClick={requestNotifPermission}
                                className="flex-shrink-0 bg-accent text-primary text-xs font-bold px-4 py-2 rounded-full hover:bg-yellow-400 transition-colors"
                            >
                                Allow
                            </button>
                            <button
                                onClick={() => setShowNotifBanner(false)}
                                className="flex-shrink-0 p-1.5 hover:bg-white/10 rounded-full transition-colors"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    )}

                    {/* FIX 10: Offline Banner */}
                    {isOffline && (
                        <div className="offline-banner" style={{background:'#1f2937',color:'white',padding:'10px 16px',display:'flex',alignItems:'center',gap:'10px',justifyContent:'center',fontSize:'13px',fontWeight:600}}>
                            <span style={{fontSize:'16px'}}>📵</span>
                            You're offline — showing cached content
                            <span style={{fontSize:'11px',color:'#9ca3af',fontWeight:400}}>Reconnect to load new articles</span>
                        </div>
                    )}

                    {/* FIX 10: Pull-to-Refresh visual indicator */}
                    {ptrActive && (
                        <div style={{position:'fixed',top:'60px',left:'50%',transform:'translateX(-50%)',zIndex:100,background:'#F5A623',color:'#0A1628',borderRadius:'999px',padding:'6px 16px',fontSize:'12px',fontWeight:700,display:'flex',alignItems:'center',gap:'8px',boxShadow:'0 4px 20px rgba(245,166,35,0.4)',pointerEvents:'none'}}>
                            <div style={{width:'14px',height:'14px',border:'2px solid #0A1628',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.6s linear infinite'}}/>
                            Refreshing...
                        </div>
                    )}
                    
                    {/* Ad Strip — Marquee only (duplicate tabs removed) */}
                    <div style={{borderTop:'none',background:'#fafafa',padding:'6px 0',overflow:'hidden',display:'flex',alignItems:'center'}} className="dark:bg-gray-900/40 border-b border-gray-100 dark:border-gray-700/60">
                        <span style={{fontSize:'9px',fontWeight:700,color:'#9ca3af',background:'transparent',padding:'2px 10px',flexShrink:0,whiteSpace:'nowrap',letterSpacing:'0.08em',textTransform:'uppercase',borderRight:'1px solid #e5e7eb'}} className="dark:border-gray-700 dark:text-gray-500">AD</span>
                        <div style={{overflow:'hidden',flex:1}}>
                            <div style={{display:'inline-block',animation:'marqueeScroll 32s linear infinite',whiteSpace:'nowrap',paddingLeft:'16px'}}>
                                <span style={{fontSize:'11px',color:'#9ca3af'}} className="dark:text-gray-500">Advertise with KWT News &nbsp;·&nbsp; Reach Kuwait &amp; worldwide readers &nbsp;·&nbsp; Contact: kwtnews.com@gmail.com &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Advertise with KWT News &nbsp;·&nbsp; Reach Kuwait &amp; worldwide readers &nbsp;·&nbsp; Contact: kwtnews.com@gmail.com</span>
                            </div>
                        </div>
                    </div>

                    {/* Top Banner Ad */}
                    <div className="container mx-auto px-4 mt-4">
                        <AdBanner position="top_banner" />
                    </div>
                    
                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* News Feed — copy protection on body text, not on buttons/links */}
                            <div className="lg:col-span-2 space-y-6 no-copy">
                                {loading ? (
                                    <>
                                        <NewsCardSkeleton />
                                        <NewsCardSkeleton />
                                        <NewsCardSkeleton />
                                    </>
                                ) : newsWithAds.length === 0 ? (
                                    /* FIX 20: Premium Empty State */
                                    <div className="empty-state-container">
                                        <div className="empty-state-icon">📭</div>
                                        <h3 style={{fontSize:'20px',fontWeight:800,marginBottom:'8px',letterSpacing:'-0.02em'}} className="text-light-text dark:text-dark-text">No stories yet</h3>
                                        <p style={{fontSize:'14px',color:'#9ca3af',maxWidth:'280px',lineHeight:'1.7',marginBottom:'24px'}}>This category has no articles right now. Try another section or come back soon!</p>
                                        <div style={{display:'flex',gap:'10px',flexWrap:'wrap',justifyContent:'center'}}>
                                            <button onClick={() => navigateTab('all')} style={{padding:'10px 22px',borderRadius:'999px',background:'#F5A623',color:'#0A1628',fontWeight:700,fontSize:'13px',border:'none',cursor:'pointer',boxShadow:'0 4px 14px rgba(245,166,35,0.35)'}}>
                                                🏠 Back to Home
                                            </button>
                                            <button onClick={() => navigateTab('world')} style={{padding:'10px 22px',borderRadius:'999px',background:'transparent',color:'#F5A623',fontWeight:700,fontSize:'13px',border:'2px solid rgba(245,166,35,0.4)',cursor:'pointer'}}>
                                                🌍 World News
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        {newsWithAds.map((item, index) => (
                                            item.type === 'ad' ? (
                                                <AdBanner key={item.id} position="in_feed" />
                                            ) : (
                                                <NewsCard 
                                                    key={item.data.id} 
                                                    news={item.data} 
                                                    index={index}
                                                    onReadMore={setSelectedNews}
                                                    likedPosts={likedPosts}
                                                    savedPosts={savedPosts}
                                                    onLikeToggle={handleLikeToggle}
                                                    onSaveToggle={handleSaveToggle}
                                                />
                                            )
                                        ))}
                                        
                                        {/* FIX 12: Infinite Scroll sentinel + spinner */}
                                        <div ref={infiniteScrollRef} style={{height:'1px'}} />
                                        {isLoadingMore && (
                                            <div className="inf-spinner" />
                                        )}
                                        {!hasMore && newsWithAds.length > 0 && (
                                            <div style={{textAlign:'center',padding:'16px 0 8px',fontSize:'12px',color:'#9ca3af',fontWeight:500}}>
                                                {t('youveReadAll')}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                            
                            {/* Sidebar */}
                            <div className="hidden lg:block">
                                <div className="sticky top-24">
                                    <Sidebar />
                                </div>
                            </div>
                        </div>
                    </main>
                    
                    <Footer />

                    {/* News Detail Modal */}
                    {selectedNews && (
                        <NewsDetailModal news={selectedNews} onClose={() => setSelectedNews(null)} />
                    )}

                    {/* Breaking News Ticker */}
                    {breakingNews.length > 0 && (
                        <div className="breaking-ticker" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:55,color:'white',display:'flex',alignItems:'center',height:'36px',boxShadow:'0 -2px 16px rgba(0,0,0,0.3)'}}>
                            <span className="breaking-label" style={{flexShrink:0,background:'rgba(0,0,0,0.25)',fontWeight:900,fontSize:'9px',letterSpacing:'0.12em',padding:'0 14px',height:'100%',display:'flex',alignItems:'center',textTransform:'uppercase',whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,0.2)'}}>🚨 BREAKING</span>
                            <div style={{overflow:'hidden',flex:1}}>
                                <div style={{display:'inline-block',animation:'marqueeScroll 32s linear infinite',whiteSpace:'nowrap',paddingLeft:'24px'}}>
                                    {[...breakingNews, ...breakingNews].map((n, i) => (
                                        <span key={i} style={{marginRight:'56px',fontSize:'12px',fontWeight:500,cursor:'pointer',opacity:0.92}} onClick={() => setSelectedNews(n)}>▶ {n.title}</span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Toast Notifications — bottom-center mobile, top-right desktop */}
                    <div className="toast-container-inner" style={{
                        position: 'fixed',
                        bottom: '80px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: '8px',
                        alignItems: 'center',
                        width: '92vw',
                        maxWidth: '360px',
                        pointerEvents: 'none',
                        zIndex: 1000,
                    }}>
                        {notifications.map(notif => (
                            <Toast
                                key={notif.id}
                                message={notif.message}
                                type={notif.type}
                                onClose={() => removeNotification(notif.id)}
                            />
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==========================================
        // ERROR BOUNDARY — prevents white screen on any JS crash
        // ==========================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('KWT News crashed:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 20px',background:'#0A1628',textAlign:'center'}}>
                            <div style={{fontSize:'56px',marginBottom:'16px'}}>📰</div>
                            <h1 style={{color:'#F5A623',fontSize:'22px',fontWeight:800,marginBottom:'8px'}}>KWT News</h1>
                            <p style={{color:'rgba(255,255,255,0.65)',fontSize:'14px',marginBottom:'28px',maxWidth:'300px',lineHeight:1.6}}>
                                Something went wrong loading the app. Please refresh the page.
                            </p>
                            <button
                                onClick={() => window.location.reload()}
                                style={{padding:'12px 32px',borderRadius:'999px',background:'#F5A623',color:'#0A1628',fontWeight:800,fontSize:'14px',border:'none',cursor:'pointer',boxShadow:'0 4px 20px rgba(245,166,35,0.4)'}}
                            >
                                🔄 Refresh Page
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Root Render
        const Root = () => (
            <ErrorBoundary>
                <ThemeProvider>
                    <AuthProvider>
                        <LanguageProvider>
                            <NotificationProvider>
                                <App />
                            </NotificationProvider>
                        </LanguageProvider>
                    </AuthProvider>
                </ThemeProvider>
            </ErrorBoundary>
        );
        
        const root = createRoot(document.getElementById('root'));
        root.render(<Root />);
        // Hide initial loader once React renders
        const loader = document.getElementById('initial-loader');
        if (loader) loader.style.display = 'none';
    </script>
    
    <!-- FIX 6: Share links use hash (#news-ID) which works on any host including GitHub Pages -->
    <!-- firebase.json rewrite is only needed for kwtnews.com direct URL sharing -->

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js')
                    .then(function (reg) { console.log('[KWT] SW registered, scope:', reg.scope); })
                    .catch(function (err) { console.warn('[KWT] SW registration failed:', err); });
            });
        }
    </script>

    <!-- PWA Install Prompt Only -->
    <script>
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('install-prompt');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            window.kwtInstallReady = true;
            setTimeout(() => {
                if (installPrompt) installPrompt.classList.add('show');
            }, 500);
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                    if (installPrompt) installPrompt.classList.remove('show');
                });
            }
        }
        
        function dismissInstall() {
            if (installPrompt) installPrompt.classList.remove('show');
            deferredPrompt = null;
        }
    </script>
</body>
  </html>
