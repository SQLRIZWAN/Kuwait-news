                    </div>
                </article>

                {/* FIX: CommentModal rendered OUTSIDE <article> to prevent event bubbling */}
                {showCommentModal && (
                    <CommentModal news={news} onClose={() => setShowCommentModal(false)} />
                )}
            </React.Fragment>
            );
        };
        
        // ==========================================
        // NEWS DETAIL MODAL
        // ==========================================
        const NewsDetailModal = ({ news, onClose }) => {
            const { t } = useTranslation();
            const { user, loading: authLoading } = useAuth(); // FIX: track auth loading
            const { addNotification } = useNotifications();
            const [isLiked, setIsLiked] = useState(false);
            const [isSaved, setIsSaved] = useState(false);
            const [likes,   setLikes]   = useState(news.likes || 0);
            const [shareOpen, setShareOpen] = useState(false);
            const [commentCount, setCommentCount] = useState(news.commentCount || 0);
            const [readProgress, setReadProgress] = useState(0);
            const scrollRef = useRef(null);
            const modalRef  = useRef(null); // FIX 18: focus trap
            useFocusTrap(modalRef);

            // FIX 19: Track reading progress
            const handleScroll = useCallback(() => {
                const el = scrollRef.current;
                if (!el) return;
                const { scrollTop, scrollHeight, clientHeight } = el;
                const total = scrollHeight - clientHeight;
                if (total <= 0) { setReadProgress(100); return; }
                setReadProgress(Math.min(100, Math.round((scrollTop / total) * 100)));
            }, []);

            useEffect(() => {
                const onKey = e => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';
                // FIX 15: Reset scroll position to top on every modal open
                if (scrollRef.current) scrollRef.current.scrollTop = 0;
                // FIX 6+9: GitHub Pages safe deep-link using hash, back button closes modal
                const base = window.location.pathname;
                try { window.history.pushState({ newsModal: news.id }, '', base + '#news-' + news.id); } catch(e) {}
                const onPop = () => onClose();
                window.addEventListener('popstate', onPop);
                return () => {
                    window.removeEventListener('keydown', onKey);
                    window.removeEventListener('popstate', onPop);
                    document.body.style.overflow = '';
                    try { window.history.replaceState({}, '', base); } catch(e) {}
                };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('users').doc(user.uid).onSnapshot(snap => {
                    if (snap.exists) {
                        const d = snap.data();
                        setIsLiked((d.likedPosts || []).includes(news.id));
                        setIsSaved((d.savedPosts || []).includes(news.id));
                    }
                }, () => {});
                return () => unsub();
            }, [user?.uid, news.id]);

            useEffect(() => {
                const tid = setTimeout(() => {
                    db.collection('news').doc(news.id).update({ views: firebase.firestore.FieldValue.increment(1) }).catch(()=>{});
                }, 2000);
                return () => clearTimeout(tid);
            }, [news.id]);

            // FIX 27: Real-time listener so likes/commentCount update while modal is open
            useEffect(() => {
                const unsub = db.collection('news').doc(news.id).onSnapshot(snap => {
                    if (snap.exists) {
                        const d = snap.data();
                        if (typeof d.likes === 'number') setLikes(d.likes);
                        if (typeof d.commentCount === 'number') setCommentCount(d.commentCount);
                    }
                }, () => {});
                return () => unsub();
            }, [news.id]);

            const likePendingRef = useRef(false);

            const handleLike = async () => {
                if (!user) { addNotification({ message: t('loginToLike'), type: 'info' }); return; }
                if (likePendingRef.current) return;
                likePendingRef.current = true;
                // FIX 2+26: Optimistic update with rollback
                const wasLiked = isLiked;
                const prevLikes = likes;
                setIsLiked(p => !p);
                setLikes(p => wasLiked ? Math.max(0, p - 1) : p + 1);
                const nr = db.collection('news').doc(news.id);
                const ur = db.collection('users').doc(user.uid);
                try {
                    if (wasLiked) {
                        await nr.update({ likes: firebase.firestore.FieldValue.increment(-1) });
                        await ur.update({ likedPosts: firebase.firestore.FieldValue.arrayRemove(news.id) });
                    } else {
                        await nr.update({ likes: firebase.firestore.FieldValue.increment(1) });
                        await ur.update({ likedPosts: firebase.firestore.FieldValue.arrayUnion(news.id) });
                    }
                } catch(e) {
                    console.error('Like error:', e);
                    setIsLiked(wasLiked);
                    setLikes(prevLikes);
                }
                finally { likePendingRef.current = false; }
            };

            const handleSave = async () => {
                if (!user) { addNotification({ message: t('loginToSave'), type: 'info' }); return; }
                const ur = db.collection('users').doc(user.uid);
                try {
                    if (isSaved) await ur.update({ savedPosts: firebase.firestore.FieldValue.arrayRemove(news.id) });
                    else         await ur.update({ savedPosts: firebase.firestore.FieldValue.arrayUnion(news.id)  });
                    setIsSaved(p => !p);
                    addNotification({ message: isSaved ? t('removedFromSaved') : t('savedToProfile'), type: 'success' });
                } catch(e) { console.error('Save error:', e); }
            };

            const doShare = async (platform) => {
                const url  = `${window.location.origin}${window.location.pathname}#news-${news.id}`;
                const text = `📰 ${news.title}\n\n🔗 ${url}\nVia KWT News — kwtnews.com`;
                if (platform === 'whatsapp')  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
                if (platform === 'facebook')  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank', 'noopener');
                if (platform === 'twitter')   window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
                if (platform === 'telegram')  window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(news.title)}`, '_blank', 'noopener');
                if (platform === 'copy') {
                    try { await navigator.clipboard.writeText(url); }
                    catch(e) { const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
                    addNotification({ message: t('linkCopied'), type: 'success' });
                }
                setShareOpen(false);
            };

            const isVideo = news.mediaType === 'video' || !!news.videoUrl;

            return (
                <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}
                     onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    {/* FIX 19: Reading Progress Bar */}
                    <div className="reading-progress-bar" style={{width: readProgress + '%'}} />
                    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.72)',backdropFilter:'blur(4px)'}} onClick={onClose}/>
                    <div ref={modalRef} style={{position:'relative',width:'100%',maxWidth:'800px',maxHeight:'94vh',borderRadius:'22px 22px 0 0',display:'flex',flexDirection:'column',overflow:'hidden',animation:'modalUp 0.28s cubic-bezier(0.25,0.46,0.45,0.94)'}}
                         className="bg-white dark:bg-gray-900">
                        {/* Handle */}
                        <div style={{display:'flex',justifyContent:'center',paddingTop:'10px',flexShrink:0}}>
                            <div style={{width:'36px',height:'4px',borderRadius:'2px'}} className="bg-gray-200 dark:bg-gray-700"/>
                        </div>
                        {/* Header */}
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 16px 10px',flexShrink:0}} className="border-b border-gray-100 dark:border-gray-800">
                            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                {news.isBreaking && <span style={{background:'#c0392b',color:'white',fontSize:'9px',fontWeight:800,padding:'2px 8px',borderRadius:'4px',textTransform:'uppercase'}}>🚨 BREAKING</span>}
                                <span style={{fontSize:'11px',fontWeight:700,color:'#F5A623',textTransform:'uppercase',letterSpacing:'0.06em'}}>{news.category || 'News'}</span>
                            </div>
                            <button onClick={onClose} style={{width:'44px',height:'44px',borderRadius:'50%',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
                                    className="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        {/* Scrollable body — FIX 19: attach ref + onScroll */}
                        <div ref={scrollRef} onScroll={handleScroll} style={{overflowY:'auto',flex:1}} className="hide-scrollbar">
                            {/* Media */}
                            <div style={{width:'100%',aspectRatio:'16/9',background:'#111',position:'relative',flexShrink:0}}>
                                {isVideo
                                    ? <video src={news.videoUrl || news.imageUrl} poster={news.thumbnail || news.thumbnailUrl || ''} controls preload="none" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                                    : <img src={news.imageUrl || 'https://placehold.co/800x450/0A1628/F5A623?text=KWT+News'} alt={news.title} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="eager" decoding="async" onError={e=>{e.target.src='https://placehold.co/800x450/0A1628/F5A623?text=KWT+News';}}/>
                                }
                                <div style={{position:'absolute',bottom:'10px',left:'10px',background:'rgba(0,0,0,0.58)',backdropFilter:'blur(6px)',borderRadius:'999px',padding:'4px 12px',display:'flex',alignItems:'center',gap:'6px'}}>
                                    {news.sourceLogo && <img src={news.sourceLogo} alt="" style={{width:'14px',height:'14px',borderRadius:'50%'}}/>}
                                    <span style={{color:'white',fontSize:'11px',fontWeight:600}}>{news.source || 'KWT News'}</span>
                                </div>
                            </div>
                            {/* Article */}
                            <div style={{padding:'18px 18px 0'}}>
                                <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px',flexWrap:'wrap'}}>
                                    <span style={{fontSize:'12px',color:'#F5A623',fontWeight:600}}><TimeAgo date={news.timestamp}/></span>
                                    {news.readTime && <span style={{fontSize:'11px',color:'#9ca3af'}}>⏱ {news.readTime} min read</span>}
                                    <span style={{fontSize:'11px',color:'#9ca3af'}}>👁 {news.views || 0}</span>
                                    <span style={{fontSize:'11px',color:'#9ca3af'}}>💬 {commentCount}</span>
                                </div>
                                <h1 style={{fontSize:'20px',fontWeight:800,lineHeight:1.35,marginBottom:'14px',letterSpacing:'-0.02em'}} className="text-gray-900 dark:text-white">{news.title}</h1>
                                {news.summary && (
                                    <p style={{fontSize:'14px',lineHeight:1.7,borderLeft:'3px solid #F5A623',paddingLeft:'12px',marginBottom:'16px',fontStyle:'italic'}} className="text-gray-500 dark:text-gray-400">{news.summary}</p>
                                )}
                                {news.content && (
                                    <div style={{fontSize:'15px',lineHeight:1.85,marginBottom:'20px',whiteSpace:'pre-wrap'}} className="text-gray-700 dark:text-gray-300">{news.content}</div>
                                )}
                                {news.tags?.length > 0 && (
                                    <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px'}}>
                                        {news.tags.map((tag, i) => (
                                            <span key={i} style={{padding:'3px 10px',borderRadius:'999px',fontSize:'11px',fontWeight:600,background:'rgba(245,166,35,0.1)',color:'#F5A623',border:'1px solid rgba(245,166,35,0.25)'}}>#{tag}</span>
                                        ))}
                                    </div>
                                )}
                            </div>
                            {/* Action bar */}
                            <div style={{display:'flex',alignItems:'center',gap:'4px',padding:'10px 18px'}} className="border-t border-b border-gray-100 dark:border-gray-800">
                                <button onClick={handleLike} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'12px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:600,transition:'all 0.2s',background:isLiked?'rgba(239,68,68,0.1)':'transparent',color:isLiked?'#ef4444':'#9ca3af'}}
                                        className="hover:bg-red-50 dark:hover:bg-red-900/20">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill={isLiked?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                    {likes > 0 && likes}
                                </button>
                                <button onClick={handleSave} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'12px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:600,transition:'all 0.2s',background:isSaved?'rgba(245,166,35,0.1)':'transparent',color:isSaved?'#F5A623':'#9ca3af'}}
                                        className="hover:bg-amber-50 dark:hover:bg-amber-900/20">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill={isSaved?"currentColor":"none"} stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                                    {isSaved ? t('savedLabel') : t('save')}
                                </button>
                                <div style={{position:'relative',marginLeft:'auto'}}>
                                    <button onClick={() => setShareOpen(p => !p)} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'12px',border:'1px solid',cursor:'pointer',fontSize:'13px',fontWeight:600,background:'transparent',color:'#9ca3af'}}
                                            className="border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                                        {t('shareLabel')}
                                    </button>
                                    {shareOpen && (
                                        <>
                                        <div style={{position:'fixed',inset:0,zIndex:400}} onClick={() => setShareOpen(false)}/>
                                        <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:401,borderRadius:'20px 20px 0 0',background:'#fff',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)',padding:'0 0 24px',animation:'modalUp 0.25s ease-out'}} className="dark:bg-gray-900">
                                            <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}><div style={{width:'36px',height:'4px',borderRadius:'2px',background:'#e5e7eb'}} className="dark:bg-gray-700"/></div>
                                            <div style={{padding:'4px 20px 12px',borderBottom:'1px solid #f3f4f6',display:'flex',alignItems:'center',justifyContent:'space-between'}} className="dark:border-gray-800">
                                                <div>
                                                    <p style={{fontWeight:700,fontSize:'15px',marginBottom:'2px'}} className="text-gray-900 dark:text-white">Share Article</p>
                                                    <p style={{fontSize:'12px',color:'#9ca3af',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{news.title}</p>
                                                </div>
                                                <button onClick={() => setShareOpen(false)}
                                                    style={{width:'44px',height:'44px',borderRadius:'50%',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginLeft:'12px'}}
                                                    className="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-red-100 hover:text-red-500 transition-colors">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                                </button>
                                            </div>
                                            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'4px',padding:'14px 12px'}}>
                                                {[
                                                    {p:'whatsapp',bg:'#25D366',icon:'📱',label:'WhatsApp'},
                                                    {p:'facebook',bg:'#1877F2',icon:'📘',label:'Facebook'},
                                                    {p:'twitter', bg:'#000',icon:'𝕏',label:'X'},
                                                    {p:'telegram',bg:'#0088cc',icon:'✈️',label:'Telegram'},
                                                    {p:'copy',bg:'#6366f1',icon:'🔗',label:'Copy Link'},
                                                ].map(s => (
                                                    <button key={s.p} onClick={() => { doShare(s.p); }}
                                                        style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',padding:'10px 4px',borderRadius:'14px',border:'none',cursor:'pointer',background:'transparent'}}
                                                        className="hover:bg-gray-50 dark:hover:bg-gray-800">
                                                        <div style={{width:'48px',height:'48px',borderRadius:'14px',background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px'}}>{s.icon}</div>
                                                        <span style={{fontSize:'10px',fontWeight:500,color:'#374151',textAlign:'center'}} className="dark:text-gray-300">{s.label}</span>
                                                    </button>
                                                ))}
                                                {navigator.share && (
                                                    <button onClick={async()=>{ try{ await navigator.share({title:news.title,url:`https://kwtnews.com/news/${news.id}`}); }catch(e){} setShareOpen(false); }}
                                                        style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',padding:'10px 4px',borderRadius:'14px',border:'none',cursor:'pointer',background:'transparent'}}
                                                        className="hover:bg-gray-50 dark:hover:bg-gray-800">
                                                        <div style={{width:'48px',height:'48px',borderRadius:'14px',background:'#F5A623',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px'}}>📤</div>
                                                        <span style={{fontSize:'10px',fontWeight:500,color:'#374151',textAlign:'center'}} className="dark:text-gray-300">More</span>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        </>
                                    )}
                                </div>
                            </div>
                            {/* Comments */}
                            <CommentsSection newsId={news.id} onCommentCountChange={setCommentCount}/>
                            <div style={{height:'20px'}}/>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMMENT MODAL — Premium chat-style full screen modal
        // ==========================================
        const CommentModal = ({ news, onClose }) => {
            const { t } = useTranslation();
            const [commentCount, setCommentCount] = useState(news.commentCount || 0);
            const [keyboardOffset, setKeyboardOffset] = useState(0); // FIX 8: iOS keyboard offset

            useEffect(() => {
                const onKey = e => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';

                // FIX 8: Use visualViewport API to handle iOS Safari keyboard
                const handleViewportResize = () => {
                    if (window.visualViewport) {
                        const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
                        setKeyboardOffset(Math.max(0, offset));
                    }
                };
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', handleViewportResize);
                    window.visualViewport.addEventListener('scroll', handleViewportResize);
                }

                return () => {
                    window.removeEventListener('keydown', onKey);
                    document.body.style.overflow = '';
                    if (window.visualViewport) {
                        window.visualViewport.removeEventListener('resize', handleViewportResize);
                        window.visualViewport.removeEventListener('scroll', handleViewportResize);
                    }
                };
            }, []);

            return (
                <div style={{
                    position:'fixed',inset:0,zIndex:350,display:'flex',flexDirection:'column',
                    /* Shrink modal to visible viewport when keyboard is open */
                    height: keyboardOffset > 0 ? `calc(100dvh - ${keyboardOffset}px)` : '100dvh'
                }}
                     className="bg-gray-50 dark:bg-gray-950">
                    {/* ── Premium Chat App Header ── */}
                    <div style={{background:'#0A1628',flexShrink:0,boxShadow:'0 2px 12px rgba(0,0,0,0.3)'}}>
                        {/* Back row */}
                        <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px 14px 8px'}}>
                            <button onClick={onClose}
                                style={{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(255,255,255,0.1)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white',flexShrink:0}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                            </button>
                            <div style={{flex:1,minWidth:0}}>
                                <p style={{fontSize:'15px',fontWeight:700,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{news.title}</p>
                                <p style={{fontSize:'11px',color:'#F5A623',marginTop:'1px'}}>💬 {commentCount} {t('comments')}</p>
                            </div>
                            {/* ❌ Close button — right side */}
                            <button onClick={onClose}
                                style={{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#ef4444',flexShrink:0}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        {/* Thin news preview strip */}
                        <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 14px 10px',borderTop:'1px solid rgba(255,255,255,0.07)'}}>
                            {news.imageUrl && (
                                <img src={news.imageUrl} alt="" style={{width:'40px',height:'40px',borderRadius:'8px',objectFit:'cover',flexShrink:0,border:'1px solid rgba(255,255,255,0.1)'}}/>
                            )}
                            <p style={{fontSize:'11px',color:'rgba(255,255,255,0.55)',flex:1,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{news.summary || news.content?.substring(0,100)}</p>
                        </div>
                    </div>
                    {/* Comments Body */}
                    <div style={{flex:1,overflowY:'auto'}} className="hide-scrollbar">
                        <CommentsSection newsId={news.id} onCommentCountChange={setCommentCount} chatStyle={true} />
                        <div style={{height:'24px'}}/>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMMENTS SECTION — real-time, like, reply, delete
        // ==========================================
        const CommentsSection = ({ newsId, onCommentCountChange, chatStyle = false }) => {
            const { t } = useTranslation();
            const { user } = useAuth();
            const { addNotification } = useNotifications();
            const [comments,     setComments]     = useState([]);
            const [newComment,   setNewComment]   = useState('');
            const [loading,      setLoading]      = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [replyTo,      setReplyTo]      = useState(null);
            const [likedCmts,    setLikedCmts]    = useState(new Set());
            const [deleteConfirm, setDeleteConfirm] = useState(null); // FIX 14: {cid, authorId} or null
            const inputRef  = useRef(null);
            const bottomRef = useRef(null); // Auto-scroll to bottom on new comment
            const commentLikePendingRef = useRef(new Set()); // Prevent double-tap on comment likes

            useEffect(() => {
                setLoading(true);
                setComments([]);
                let unsub = () => {};

                // Primary: ordered by timestamp ascending (oldest first = natural chat flow)
                const primaryQuery = db.collection('comments')
                    .where('newsId', '==', newsId)
                    .where('timestamp', '>', new Date(0))
                    .orderBy('timestamp', 'asc');

                unsub = primaryQuery.onSnapshot(snap => {
                    const data = snap.docs.map(d => ({
                        id: d.id, ...d.data(),
                        timestamp: d.data().timestamp?.toDate()
                    }));
                    setComments(data);
                    onCommentCountChange && onCommentCountChange(data.length);
                    setLoading(false);
                    // Scroll to bottom so newest comment is visible
                    setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 80);
                }, () => {
                    // Fallback without ordering (no index needed)
                    unsub = db.collection('comments')
                        .where('newsId', '==', newsId)
                        .onSnapshot(snap => {
                            const data = snap.docs
                                .map(d => ({ id: d.id, ...d.data(), timestamp: d.data().timestamp?.toDate() }))
                                .sort((a, b) => {
                                    const ta = a.timestamp ? a.timestamp.getTime() : 0;
                                    const tb = b.timestamp ? b.timestamp.getTime() : 0;
                                    return ta - tb; // oldest first
                                });
                            setComments(data);
                            onCommentCountChange && onCommentCountChange(data.length);
                            setLoading(false);
                        }, () => setLoading(false));
                });

                return () => unsub();
            }, [newsId]);

            // Auto-focus on open (chat mode)
            useEffect(() => {
                if (!loading && inputRef.current && chatStyle) {
                    setTimeout(() => inputRef.current?.focus(), 300);
                }
            }, [loading, chatStyle]);

            // Real-time liked comments for current user
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('users').doc(user.uid).onSnapshot(snap => {
                    if (snap.exists) setLikedCmts(new Set(snap.data().likedComments || []));
                }, () => {});
                return () => unsub();
            }, [user?.uid]);

            const handleSubmit = async e => {
                if (e && e.preventDefault) e.preventDefault();
                const text = newComment.trim();
                if (!text || !user || isSubmitting) return;
                setIsSubmitting(true);
                const replyRef = replyTo; // capture before clearing
                setNewComment('');
                setReplyTo(null);
                try {
                    await db.collection('comments').add({
                        newsId,
                        content: replyRef ? `@${replyRef.name} ${text}` : text,
                        authorId:    user.uid,
                        authorName:  user.displayName || 'Anonymous',
                        authorPhoto: user.photoURL || null,
                        timestamp:   firebase.firestore.FieldValue.serverTimestamp(),
                        // FIX 4: Track updatedAt separately so edits don't break sort order
                        updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
                        likes: 0,
                    });
                    await db.collection('news').doc(newsId).update({ commentCount: firebase.firestore.FieldValue.increment(1) }).catch(()=>{});
                    inputRef.current?.focus();
                } catch(err) {
                    console.error(err);
                    setNewComment(text); // restore on failure
                    setReplyTo(replyRef);
                    addNotification({ message: t('failedComment'), type: 'error' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleCommentLike = async comment => {
                if (!user) { addNotification({ message: t('loginToLike'), type: 'info' }); return; }
                if (commentLikePendingRef.current.has(comment.id)) return;
                commentLikePendingRef.current.add(comment.id);
                const liked = likedCmts.has(comment.id);
                try {
                    await db.collection('comments').doc(comment.id).update({ likes: firebase.firestore.FieldValue.increment(liked ? -1 : 1) });
                    const ur = db.collection('users').doc(user.uid);
                    if (liked) await ur.update({ likedComments: firebase.firestore.FieldValue.arrayRemove(comment.id) });
                    else       await ur.update({ likedComments: firebase.firestore.FieldValue.arrayUnion(comment.id) });
                } catch(e) { console.error('Comment like error:', e); }
                finally { commentLikePendingRef.current.delete(comment.id); }
            };

            const handleDelete = (cid, authorId) => {
                if (user?.uid !== authorId) return;
                // FIX 14: Use custom confirmation instead of native window.confirm
                setDeleteConfirm({ cid, authorId });
            };

            const confirmDelete = async () => {
                if (!deleteConfirm) return;
                const { cid } = deleteConfirm;
                setDeleteConfirm(null);
                await db.collection('comments').doc(cid).delete().catch(()=>{});
                await db.collection('news').doc(newsId).update({ commentCount: firebase.firestore.FieldValue.increment(-1) }).catch(()=>{});
            };

            return (
                <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
                    {/* FIX 14: Custom delete confirmation modal */}
                    {deleteConfirm && (
                        <div style={{position:'fixed',inset:0,zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)'}}>
                            <div style={{background:'#fff',borderRadius:'16px',padding:'24px',width:'300px',maxWidth:'90vw',boxShadow:'0 24px 64px rgba(0,0,0,0.4)',textAlign:'center'}} className="dark:bg-gray-900">
                                <div style={{fontSize:'40px',marginBottom:'12px'}}>🗑️</div>
                                <p style={{fontWeight:700,fontSize:'15px',marginBottom:'6px'}} className="text-gray-900 dark:text-white">{t('deleteComment')}</p>
                                <p style={{fontSize:'12px',color:'#9ca3af',marginBottom:'20px'}}>This action cannot be undone.</p>
                                <div style={{display:'flex',gap:'10px'}}>
                                    <button onClick={() => setDeleteConfirm(null)}
                                        style={{flex:1,padding:'10px',borderRadius:'10px',border:'1.5px solid #e5e7eb',background:'transparent',fontWeight:600,fontSize:'13px',cursor:'pointer'}}
                                        className="text-gray-700 dark:text-gray-300 dark:border-gray-700">
                                        {t('cancel')}
                                    </button>
                                    <button onClick={confirmDelete}
                                        style={{flex:1,padding:'10px',borderRadius:'10px',border:'none',background:'#ef4444',color:'white',fontWeight:700,fontSize:'13px',cursor:'pointer'}}>
                                        {t('delete')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* Comment list */}
                    <div style={{flex:1,padding:'16px',display:'flex',flexDirection:'column',gap:'8px'}}>
                        {!chatStyle && (
                            <h3 style={{fontWeight:700,fontSize:'15px',marginBottom:'8px',display:'flex',alignItems:'center',gap:'8px'}} className="text-gray-900 dark:text-white">

        };

        // Ad Component — real-time, video support, loop, muted by default, unmute button
        const AdBanner = ({ position, className = "" }) => {
            const { t } = useTranslation();
            const [adData, setAdData] = useState(null);
            const [isMuted, setIsMuted] = useState(true);
            const videoRef = useRef(null);
            const impressionTracked = useRef(null); // Bug Fix: prevent infinite impression loop

            useEffect(() => {
                // Real-time ad listener with onSnapshot
                const unsub = db.collection('ads')
                    .where('position', '==', position)
                    .limit(10)
                    .onSnapshot(snapshot => {
                        const now = new Date();
                        const valid = snapshot.docs.filter(doc => {
                            const d = doc.data();
                            // Bug Fix 1: Correct active check — exclude any ad that is not explicitly active:true
                            if (!d.active) return false;
                            try {
                                const start = d.startDate?.toDate ? d.startDate.toDate() : new Date((d.startDate || '2000-01-01') + 'T00:00:00');
                                const end   = d.endDate?.toDate   ? d.endDate.toDate()   : new Date((d.endDate   || '2099-12-31') + 'T23:59:59');
                                return now >= start && now <= end;
                            } catch(e) { return true; }
                        });
                        if (valid.length > 0) {
                            const adDoc = valid[Math.floor(Math.random() * valid.length)];
                            const data = { id: adDoc.id, ...adDoc.data() };
                            setAdData(prev => prev?.id === data.id ? prev : data);
                            // Bug Fix 2: Infinite loop prevention — impressions tabhi increment hon
                            // jab nayi ad pehli baar dikhti hai (onSnapshot update pe nahi)
                            // Warna: impression update → snapshot fires → impression update → infinite loop!
                            if (impressionTracked.current !== adDoc.id) {
                                impressionTracked.current = adDoc.id;
                                db.collection('ads').doc(adDoc.id).update({ impressions: firebase.firestore.FieldValue.increment(1) }).catch(()=>{});
                            }
                        } else {
                            setAdData(null);
                        }
                    }, () => {});
                return () => unsub();
            }, [position]);

            const handleAdClick = async (e) => {
                e.stopPropagation();
                if (!adData) return;
                // Track click
                db.collection('ads').doc(adData.id).update({ clicks: firebase.firestore.FieldValue.increment(1) }).catch(()=>{});
                // Open target URL
                const url = adData.targetUrl || adData.link || adData.url;
                if (url) {
                    window.open(url, '_blank', 'noopener,noreferrer');
                }
            };

            const toggleMute = (e) => {
                e.stopPropagation();
                e.preventDefault();
                const newMuted = !isMuted;
                setIsMuted(newMuted);
                if (videoRef.current) videoRef.current.muted = newMuted;
            };

            if (!adData) return null;

            const isVideo = adData.mediaType === 'video' || adData.videoUrl || (adData.imageUrl && adData.imageUrl.match(/\.(mp4|webm|ogg)(\?|$)/i));
            const mediaSrc = adData.videoUrl || adData.imageUrl;
            const targetUrl = adData.targetUrl || adData.link || adData.url || '#';

            return (
                <div className={`kwt-ad-banner relative overflow-hidden ${className}`}
                     style={{background:'#f8fafc', cursor:'pointer', marginBottom:'20px', marginTop:'6px'}}
                     onClick={handleAdClick}>
                    {/* Sponsored badge */}
                    <div style={{position:'absolute',top:'8px',left:'8px',zIndex:5,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)',color:'white',fontSize:'9px',fontWeight:800,padding:'3px 8px',borderRadius:'6px',letterSpacing:'0.08em',textTransform:'uppercase',userSelect:'none',border:'1px solid rgba(255,255,255,0.15)'}}>
                        {t('sponsored')}
                    </div>

                    {isVideo ? (
                        <div style={{position:'relative',width:'100%',height:'112px',background:'#000',overflow:'hidden'}}>
                            <video
                                ref={videoRef}
                                src={mediaSrc}
                                poster={adData.thumbnail || adData.imageUrl}
                                autoPlay
                                loop
                                muted={isMuted}
                                playsInline
                                style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}
                            />
                            {/* FIX 20: Unmute/mute button — zIndex above ad click layer, stopPropagation prevents ad open */}
                            <button onClick={toggleMute}
                                style={{position:'absolute',bottom:'8px',right:'8px',zIndex:20,background:'rgba(0,0,0,0.6)',border:'none',borderRadius:'50%',width:'44px',height:'44px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white'}}>
                                {isMuted
                                    ? <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                                    : <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                                }
                            </button>
                            {/* Title overlay */}
                            {adData.title && (
                                <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,0.75))',padding:'20px 10px 8px',color:'white',fontSize:'11px',fontWeight:600}}>{adData.title}</div>
                            )}
                        </div>
                    ) : (
                        <div style={{position:'relative',width:'100%',overflow:'hidden',maxHeight:'160px'}}>
                            <img
                                src={mediaSrc || 'https://via.placeholder.com/800x200?text=Advertisement'}
                                alt={adData.title || 'Advertisement'}
                                style={{width:'100%',height:'auto',maxHeight:'160px',objectFit:'cover',display:'block'}}
                                onError={e => { e.target.style.display='none'; }}
                            />
                            {adData.title && (
                                <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(transparent,rgba(0,0,0,0.7))',padding:'16px 10px 6px',color:'white',fontSize:'11px',fontWeight:600}}>{adData.title}</div>
                            )}
                        </div>
                    )}
                    {/* Description row */}
                    {adData.description && (
                        <div style={{padding:'5px 10px 6px',fontSize:'10px',color:'#6b7280',background:'#f9fafb',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} className="dark:bg-gray-800 dark:text-gray-400">
                            {adData.description}
                        </div>
                    )}
                </div>
            );
        };
        
        // Sidebar Component
        const Sidebar = () => {
            const { t } = useTranslation();
            const [trending, setTrending] = useState([]);
            const [latest, setLatest] = useState([]);
            
            useEffect(() => {
                // Fetch trending news
                const unsubTrending = db.collection('news')
                    .orderBy('views', 'desc')
                    .limit(10)
                    .onSnapshot(snapshot => {
                        setTrending(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() }))
                            .filter(n => !n.hidden && (!n.status || n.status === 'active' || n.status === 'Active'))
                            .slice(0, 5));
                    }, () => {});
                    
                // Fetch latest news
                const unsubLatest = db.collection('news')
                    .orderBy('timestamp', 'desc')
                    .limit(10)
                    .onSnapshot(snapshot => {
                        setLatest(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() }))
                            .filter(n => !n.hidden && (!n.status || n.status === 'active' || n.status === 'Active'))
                            .slice(0, 5));
                    }, () => {});
                    
                return () => {
                    unsubTrending();
                    unsubLatest();
                };
            }, []);
            
            const SidebarItem = ({ item, index }) => (
                <a 
                    href={`/news/${item.id}`}
                    className="flex gap-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors group"
                    style={{textDecoration:'none'}}
                >
                    <span className="sidebar-item-num" style={{fontSize:'20px',fontWeight:900,color:'rgba(245,166,35,0.3)',minWidth:'28px',lineHeight:'1.3'}}>
                        {String(index + 1).padStart(2, '0')}
                    </span>
                    <div className="flex-1" style={{minWidth:0}}>
                        <h4 style={{fontWeight:600,fontSize:'13px',lineHeight:'1.45',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',margin:0}} className="text-gray-800 dark:text-gray-100 group-hover:text-accent transition-colors">
                            {item.title}
                        </h4>
                        <span style={{fontSize:'11px',color:'#9ca3af',marginTop:'4px',display:'block'}}>
                            <TimeAgo date={item.timestamp} />
                        </span>
                    </div>
                </a>
            );
            
            return (
                <aside className="space-y-6">
                    {/* Top Banner Ad */}
                    <AdBanner position="sidebar_top" />
                    
                    {/* Trending Section */}
                    <div className="sidebar-card bg-light-card dark:bg-dark-card">
                        <div className="p-4 border-b border-gray-100 dark:border-gray-700/60" style={{background:'linear-gradient(135deg,#0A1628 0%,#162040 100%)'}}>
                            <h3 className="font-bold text-white flex items-center gap-2" style={{fontSize:'14px',letterSpacing:'0.01em'}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                                {t('trending')}
                            </h3>
                        </div>
                        <div className="divide-y divide-gray-100 dark:divide-gray-700/50">
                            {trending.map((item, idx) => (
                                <SidebarItem key={item.id} item={item} index={idx} />
                            ))}
                        </div>
                    </div>
                    
                    {/* Latest Section */}
                    <div className="sidebar-card bg-light-card dark:bg-dark-card">
                        <div className="p-4 border-b border-gray-100 dark:border-gray-700/60" style={{background:'linear-gradient(135deg,#0A1628 0%,#162040 100%)'}}>
                            <h3 className="font-bold text-white flex items-center gap-2" style={{fontSize:'14px',letterSpacing:'0.01em'}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                {t('latest')}
                            </h3>
                        </div>
                        <div className="divide-y divide-gray-100 dark:divide-gray-700/50">
                            {latest.map((item, idx) => (
                                <SidebarItem key={item.id} item={item} index={idx} />
                            ))}
                        </div>
                    </div>
                    
                    {/* Sidebar Ad */}
                    <AdBanner position="sidebar_bottom" />
                    
                    {/* Social Links */}
                    <div className="sidebar-card bg-light-card dark:bg-dark-card p-4">
                        <h3 style={{fontWeight:700,fontSize:'12px',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:'14px',display:'flex',alignItems:'center',gap:'8px'}} className="text-gray-500 dark:text-gray-400">
                            <span style={{color:'#F5A623'}}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            </span>
                            {t('followUs')}
                        </h3>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>

        // Main App Component
        const App = () => {
            // ── ALL useState/useRef declarations FIRST (Rules of Hooks) ──
            const [activeTab, setActiveTab] = useState(() => {
                try { return localStorage.getItem('kwtActiveTab') || 'all'; } catch(e) { return 'all'; }
            });
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedNews, setSelectedNews] = useState(null);

            const [notifPermission, setNotifPermission] = useState(

            );
            const [showNotifBanner, setShowNotifBanner] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [isLoadingMore, setIsLoadingMore] = useState(false);
            const [ptrActive, setPtrActive] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0); // FIX: soft refresh
            const [likedPosts,  setLikedPosts]  = useState([]);
            const [savedPosts,  setSavedPosts]  = useState([]);
            // Refs
            const infiniteScrollRef = useRef(null);
            const ptrStartY = useRef(null);
            const ptrThreshold = 80;
            const tabHistory = useRef(['all']);
            // Hooks
            const { news, loading, hasMore, loadMore } = useNews(activeTab, 20, refreshKey);
            const { notifications, removeNotification, addNotification } = useNotifications();
            const { t } = useTranslation();
            const { user } = useAuth();

            // ── FIX 10: online/offline ──
            useEffect(() => {
                const onOnline  = () => setIsOffline(false);
                const onOffline = () => setIsOffline(true);
                window.addEventListener('online',  onOnline);
                window.addEventListener('offline', onOffline);
                return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
            }, []);

            // ── FIX 6: Deep-link open on load (hash-based, GitHub Pages safe) ──
            useEffect(() => {
                const hash = window.location.hash;
                const match = hash.match(/^#news-(.+)$/);
                if (match) {
                    const newsId = match[1];
                    db.collection('news').doc(newsId).get().then(doc => {
                        if (doc.exists) {
                            setSelectedNews({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() });
                        }
                    }).catch(() => {});
                }
            }, []);

            // ── FIX 12: Infinite scroll — use ref to avoid stale closure bug ──
            const isLoadingMoreRef = useRef(false);
            useEffect(() => {
                if (!infiniteScrollRef.current) return;
                const observer = new IntersectionObserver(async (entries) => {
                    if (entries[0].isIntersecting && hasMore && !isLoadingMoreRef.current && !loading) {
                        isLoadingMoreRef.current = true;
                        setIsLoadingMore(true);
                        try {
                            await loadMore();
                        } catch(e) {
                            console.error('Infinite scroll load error:', e);
                        } finally {
                            isLoadingMoreRef.current = false;
                            setIsLoadingMore(false);
                        }
                    }
                }, { threshold: 0.1, rootMargin: '100px' }); // FIX 11: was 300px — caused premature loading
                observer.observe(infiniteScrollRef.current);
                return () => observer.disconnect();
            }, [hasMore, loading, loadMore]);

            // ── FIX 18: Pull-to-Refresh ──
            const handleTouchStart = useCallback((e) => {
                if (window.scrollY === 0) ptrStartY.current = e.touches[0].clientY;
            }, []);
            const handleTouchMove = useCallback((e) => {
                if (ptrStartY.current === null) return;
                const dy = e.touches[0].clientY - ptrStartY.current;
                if (dy > ptrThreshold) setPtrActive(true);
            }, []);
            const handleTouchEnd = useCallback(() => {
                if (ptrActive) {
                    setPtrActive(false);
                    // FIX: Soft refresh — just increment refreshKey, NO page reload
                    setRefreshKey(k => k + 1);
                }
                ptrStartY.current = null;
            }, [ptrActive]);
            useEffect(() => {
                window.addEventListener('touchstart', handleTouchStart, { passive: true });
                window.addEventListener('touchmove',  handleTouchMove,  { passive: true });
                window.addEventListener('touchend',   handleTouchEnd,   { passive: true });
                return () => {
                    window.removeEventListener('touchstart', handleTouchStart);
                    window.removeEventListener('touchmove',  handleTouchMove);
                    window.removeEventListener('touchend',   handleTouchEnd);
                };
            }, [handleTouchStart, handleTouchMove, handleTouchEnd]);

            // ── Single shared user-data listener ──
            useEffect(() => {
                if (!user) { setLikedPosts([]); setSavedPosts([]); return; }
                const unsub = db.collection('users').doc(user.uid).onSnapshot(snap => {
                    if (snap.exists) {
                        setLikedPosts(snap.data().likedPosts  || []);
                        setSavedPosts(snap.data().savedPosts  || []);
                    }
                }, () => {});
                return () => unsub();
            }, [user?.uid]);

            // ── Background silent refresh every 30 seconds (no spinner shown) ──
            useEffect(() => {
                const interval = setInterval(() => {
                    // Increment refreshKey silently — useNews only shows skeleton on category change,
                    // so this triggers a background data reload without any visible loading indicator.
                    setRefreshKey(k => k + 1);
                }, 30000);
                return () => clearInterval(interval);
            }, []);

            const handleLikeToggle  = useCallback((id, liked) => {
                setLikedPosts(prev => liked ? [...prev, id] : prev.filter(x => x !== id));
            }, []);
            const handleSaveToggle  = useCallback((id, saved) => {
                setSavedPosts(prev => saved ? [...prev, id] : prev.filter(x => x !== id));
            }, []);

            // Breaking news real-time
            useEffect(() => {
                const unsub = db.collection('news')
                    .where('isBreaking', '==', true)
                    .orderBy('timestamp', 'desc')
                    .limit(5)
                    .onSnapshot(snap => {
                        setBreakingNews(snap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .filter(n => !n.hidden && (!n.status || n.status === 'active' || n.status === 'Active')));
                    }, () => {});
                return () => unsub();
            }, []);

            // ── Hardware Back Button ──────────────────────────────────────────
            const navigateTab = useCallback((tabId) => {
                if (tabId === activeTab) return;
                try { localStorage.setItem('kwtActiveTab', tabId); } catch(e) {}
                tabHistory.current.push(tabId);
                // FIX 3: Use pushState ONLY once (initial), then replaceState for tab switches
                // This way back button only fires once instead of N times
                window.history.pushState({ tab: tabId }, '', '');
                setActiveTab(tabId);
            }, [activeTab]);

            useEffect(() => {
                // FIX 3: replaceState for the initial entry — no history spam
                window.history.replaceState({ tab: activeTab }, '', '');

                const onPopState = (e) => {
                    const hist = tabHistory.current;
                    if (hist.length > 1) {
                        hist.pop();
                        const prev = hist[hist.length - 1];
                        setActiveTab(prev);
                        try { localStorage.setItem('kwtActiveTab', prev); } catch(e) {}
                        // Use replaceState so we don't keep growing browser history
                        window.history.replaceState({ tab: prev }, '', '');
                        // Re-push one entry so the next back press fires popstate again
                        window.history.pushState({ tab: prev }, '', '');
                    }
                    // If only one entry left, let browser handle (exit / go back normally)
                };

                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);

            // ── Push Notification Permission ─────────────────────────────────
            useEffect(() => {
                // Show banner after 4 sec if permission not decided yet
                if (typeof Notification === 'undefined') return;
                if (Notification.permission === 'default') {
                    const timer = setTimeout(() => setShowNotifBanner(true), 4000);

            const requestNotifPermission = async () => {
                setShowNotifBanner(false);

                    const permission = await Notification.requestPermission();
